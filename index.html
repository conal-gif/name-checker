<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Name Checker</title>
  <style>
    body {
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
      gap: 20px;
    }
    #message-box {
      font-size: 20px;
      padding: 15px 30px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    #name-input {
      font-size: 16px;
      padding: 10px 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      width: 280px;
    }
    #check-btn {
      background: #FFD700;
      border: none;
      padding: 12px 40px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <p id="message-box">Enter a name and click the button.</p>
  <input type="text" id="name-input" placeholder="Type a name here..." />
  <button id="check-btn" onclick="checkName()">Check</button>

  <script>
    // *** EDIT THIS LIST with your actual names ***
    const nameList = ["alice", "bob", "charlie", "diana"];

    function checkName() {
      const input = document.getElementById("name-input").value.trim().toLowerCase();
      const box = document.getElementById("message-box");
      if (!nameList.includes(input)) {
        box.textContent = "Name not found!"; // *** Change this message too ***
      }
    }
  </script>
</body>
</html>
