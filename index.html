<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Name Checker</title>
  <style>
    body {
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
      gap: 20px;
    }
    #message-box {
      font-size: 20px;
      padding: 15px 30px;
      border: 1px solid #ccc;
      border-radius: 8px;
      min-width: 300px;
      text-align: center;
    }
    #name-input {
      font-size: 16px;
      padding: 10px 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      width: 280px;
    }
    #check-btn {
      background: #FFD700;
      border: none;
      padding: 12px 40px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    #check-btn:active {
      background: #e6c200;
    }
  </style>
</head>
<body>
  <p id="message-box">Enter a name and click the button.</p>
  <input type="text" id="name-input" placeholder="Type a name here..." />
  <button id="check-btn">Check</button>

  <script>
    // *** EDIT THESE LISTS with your actual names ***
    const listA = ["alice", "bob"];
    const listB = ["charlie", "diana"];
    const listC = ["edward", "fiona"];
    // Add more lists here if needed, e.g:
    // const listD = ["george", "hannah"];

    // Combine all lists into one master list
    const allNames = [...listA, ...listB, ...listC];

    document.getElementById("check-btn").addEventListener("click", function() {
      const input = document.getElementById("name-input").value.trim().toLowerCase();
      const box = document.getElementById("message-box");

      if (input === "") {
        box.textContent = "Please enter a name.";
        return;
      }

      if (allNames.includes(input)) {
        // Name IS on a list — ignore it, reset to default
        box.textContent = "Enter a name and click the button.";
      } else {
        // Name is NOT on any list — display the entered name
        box.textContent = input;
      }
    });
  </script>
</body>
</html>
