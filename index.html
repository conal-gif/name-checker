<!DOCTYPE html>

  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      background-image: url('background.jpg');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 30px 40px;
    }

    #hashtag {
      font-size: 42px;
      font-weight: 900;
      color: #FFD700;
      text-align: left;
      width: 100%;
      max-width: 420px;
      line-height: 1.1;
      margin-bottom: 18px;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
    }

    #current-name {
      width: 100%;
      max-width: 420px;
      background: white;
      border: 3px solid white;
      border-radius: 10px;
      font-size: 36px;
      font-weight: 700;
      color: #111;
      text-align: center;
      padding: 14px 20px;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      font-family: 'Barlow', sans-serif;
    }

    #status-msg {
      font-size: 15px;
      font-weight: 700;
      color: white;
      text-align: center;
      min-height: 22px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
      margin-bottom: 0;
    }

    .spacer { flex: 0.4; }

    #name-input {
      width: 100%;
      max-width: 420px;
      background: white;
      border: 3px solid white;
      border-radius: 10px;
      font-size: 22px;
      font-weight: 700;
      color: #111;
      padding: 16px 20px;
      font-family: 'Barlow', sans-serif;
      outline: none;
      margin-bottom: 16px;
    }

    #name-input::placeholder {
      color: #aaa;
      font-weight: 700;
    }

    #upload-btn {
      width: 60%;
      max-width: 260px;
      background: #FFD700;
      border: none;
      border-radius: 14px;
      font-size: 32px;
      font-weight: 900;
      color: #111;
      padding: 16px 20px;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      letter-spacing: 0.5px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    #upload-btn:active { background: #e6c200; }
  </style>
</head>
<body>

  <div id="hashtag">#YourLemonCrush</div>
  <div id="current-name">Loading...</div>
  <div id="status-msg"></div>
  <div class="spacer"></div>
  <input type="text" id="name-input" placeholder="type the name of your crush..." />
  <button id="upload-btn">Upload</button>

<script>
  const FIREBASE_URL = "https://my-crush-278a7-default-rtdb.asia-southeast1.firebasedatabase.app";

  // *** EXACT MATCH BLOCK LIST ***
  const listA = ["faggot", "cunny", "cunni", "diddy", "skank", "penis", "vag", "dyke", "dike" ,"lezbo" ,"chesticle", "testicle" ,"testicles" ,"clit" ,"dilf" ,"milf","di1f" ,"mi1f" ,"hitler" ,"hitler", "hardon" , "jism" ,"peepee" ,"poopoo" ];
  const listB = ["s1ut", "hitler", "fa99ot", "fagg0t", "homo", "anus", "arsehole", "azzhole", "bollocks", "nig" , "nog", "ni99er", "cum" ,"cumming" ,"currymuncher" ,"darkie","darkies", "fellatio","ghey", "ghay", "jewboy" ];
  const listC = ["nazi", "hoe", "skank", "whore", "d1ck", "balls", "balllicker" ,"bigbreasts" ,"bestiality" ,"biatch" ,"bumfuck" ,"bumfucker" ,"cntz", "cnts", "cnut" ,"cracker", "fatfucker", "gypsys", "hezbollah", "hamas", "isis" ,"jisim" ,"jizim" ];
  const allNames = [...listA, ...listB, ...listC];

  // *** CONTAINS BLOCK LIST ***
  const blockedWords = [
    "bitch", "nigger", "shit", "cunt", "slut", "whore", "cock" ,"ass", "arrse",  "arse", "cunt", "fag", "nazi","naz1", "pussy" , "slut", "wank", "jerk" , "blowjob", "boner", "bum", "butt"  , "dipshit" , "holestuffer", "massterb", "masterb", "master", "mastur",
    "fuck", "lick", "fanny", "dick","d1ck", "cock", "chink", "slant" , "f4g" , "fa9", "anal", "bareback", "bastard", "boobie", "diaper", "gook", "hardcore", "jackoff", "kike", "kyke", "molest", "muff", "negro", "negr0", "negres", "niggar", "niggah", 
    "boob", "booob", "boooob", "booooob", "b00b", "b000b", "b0000b", "b00000b" , "breast" , "gay", "lesbian", "lezbian" ,"dildo" ,"dingleber", "golliwog", "goldenshower" , "fukah", "fuker", "fukkah", "fukker", "nigg", "orgasim", 
    "bukake", "bukkake" ,"crotch", "creampie" ,"deepthroat" ,"doggiestyle" ,"douche" ,"doublepenetration", "ejaculat" ,"ejackulat" ,"fanny", "fart", "fcuk", "feltch" ,"fuktard", "goddam", "cammeltoe", "paedophile" , "peeenus" ,"pantie" ,"panty" 
  ];

  // *** GOOD NAMES — cycled automatically when no submission for 5 minutes ***
  const goodNames = [
    "Sophie",
    "Emma",
    "Liam",
    "Olivia",
    "Noah",
    "Ava",
    "Jack",
    "Isabella"
    // Add as many as you like
  ];

  // How long to wait before cycling to next good name (milliseconds)
  const CYCLE_INTERVAL_MS = 5 * 60 * 1000; // 5 minutes

  const nameDisplay = document.getElementById("current-name");
  const statusMsg   = document.getElementById("status-msg");
  const input       = document.getElementById("name-input");
  const btn         = document.getElementById("upload-btn");

  let goodNameIndex = 0;
  let cycleTimer = null;

  // --- Filtering ---
  function containsBlockedWord(text) {
    const lower = text.toLowerCase();
    return blockedWords.some(word => lower.includes(word.toLowerCase()));
  }

  // --- Good name cycling ---
  function publishNextGoodName() {
    const name = goodNames[goodNameIndex % goodNames.length];
    goodNameIndex++;

    fetch(`${FIREBASE_URL}/crush.json`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, autoPosted: true, timestamp: Date.now() })
    }).catch(() => {}); // Fail silently for auto-posts
  }

  function resetCycleTimer() {
    // Clear any existing timer and start a fresh 5-minute countdown
    if (cycleTimer) clearTimeout(cycleTimer);
    cycleTimer = setTimeout(function tick() {
      publishNextGoodName();
      cycleTimer = setTimeout(tick, CYCLE_INTERVAL_MS);
    }, CYCLE_INTERVAL_MS);
  }

  // --- Load current name from Firebase ---
  function loadCurrentName() {
    fetch(`${FIREBASE_URL}/crush.json`)
      .then(r => {
        if (!r.ok) throw new Error("Bad response");
        return r.json();
      })
      .then(data => {
        if (data && data.name) {
          nameDisplay.textContent = data.name;

          // If the stored name was a real user submission (not auto-posted),
          // check how long ago it was posted and set the timer accordingly
          if (!data.autoPosted && data.timestamp) {
            const elapsed = Date.now() - data.timestamp;
            const remaining = CYCLE_INTERVAL_MS - elapsed;
            if (remaining > 0) {
              // Still within the 5-minute window — wait out the remainder
              if (cycleTimer) clearTimeout(cycleTimer);
              cycleTimer = setTimeout(function tick() {
                publishNextGoodName();
                cycleTimer = setTimeout(tick, CYCLE_INTERVAL_MS);
              }, remaining);
            } else {
              // Already overdue — cycle now
              publishNextGoodName();
              resetCycleTimer();
            }
          }
        } else {
          nameDisplay.textContent = "—";
        }
      })
      .catch(() => {
        nameDisplay.textContent = "—";
        statusMsg.style.color = "white";
        statusMsg.textContent = "Could not connect. Check Firebase URL.";
      });
  }

  // Poll Firebase every 5 seconds to reflect changes on all devices
  loadCurrentName();
  setInterval(loadCurrentName, 5000);

  // Start the cycle timer on page load
  resetCycleTimer();

  // --- Upload button ---
  btn.addEventListener("click", function () {
    const rawInput  = input.value.trim();
    const lowerInput = rawInput.toLowerCase();

    statusMsg.style.color = "white";
    statusMsg.textContent = "";

    if (rawInput === "") {
      statusMsg.textContent = "Please type a name first.";
      return;
    }

    if (allNames.includes(lowerInput) || containsBlockedWord(rawInput)) {
      statusMsg.textContent = "That name is not available.";
      input.value = "";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Uploading...";

    fetch(`${FIREBASE_URL}/crush.json`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      // Store timestamp so the cycle timer knows when to kick in
      body: JSON.stringify({ name: rawInput, autoPosted: false, timestamp: Date.now() })
    })
      .then(r => {
        if (!r.ok) throw new Error("Upload failed");
        return r.json();
      })
      .then(() => {
        nameDisplay.textContent = rawInput;
        statusMsg.style.color = "#FFD700";
        statusMsg.textContent = "Uploaded!";
        input.value = "";
        // Reset the 5-minute countdown from the moment of this submission
        resetCycleTimer();
        setTimeout(() => statusMsg.textContent = "", 3000);
      })
      .catch(() => {
        statusMsg.textContent = "Upload failed. Please try again.";
      })
      .finally(() => {
        btn.disabled = false;
        btn.textContent = "Upload";
      });
  });
</script>

</body>
</html>
