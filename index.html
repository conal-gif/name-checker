<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>My Crush</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      background-image: url('background.jpg');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 30px 40px;
    }

    #hashtag {
      font-size: 42px;
      font-weight: 900;
      color: #FFD700;
      text-align: left;
      width: 100%;
      max-width: 420px;
      line-height: 1.1;
      margin-bottom: 18px;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
    }

    #current-name {
      width: 100%;
      max-width: 420px;
      background: white;
      border: 3px solid white;
      border-radius: 10px;
      font-size: 36px;
      font-weight: 700;
      color: #111;
      text-align: center;
      padding: 14px 20px;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      font-family: 'Barlow', sans-serif;
    }

    #status-msg {
      font-size: 15px;
      font-weight: 700;
      color: white;
      text-align: center;
      min-height: 22px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
      margin-bottom: 0;
    }

    .spacer {
      flex: 1;
    }

    #name-input {
      width: 100%;
      max-width: 420px;
      background: white;
      border: 3px solid white;
      border-radius: 10px;
      font-size: 22px;
      font-weight: 700;
      color: #111;
      padding: 16px 20px;
      font-family: 'Barlow', sans-serif;
      outline: none;
      margin-bottom: 16px;
    }

    #name-input::placeholder {
      color: #aaa;
      font-weight: 700;
    }

    #upload-btn {
      width: 60%;
      max-width: 260px;
      background: #FFD700;
      border: none;
      border-radius: 14px;
      font-size: 32px;
      font-weight: 900;
      color: #111;
      padding: 16px 20px;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      letter-spacing: 0.5px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    #upload-btn:active {
      background: #e6c200;
    }
  </style>
</head>
<body>

  <div id="hashtag">#YourLemonCrush</div>

  <div id="current-name">Loading...</div>
  <div id="status-msg"></div>

  <div class="spacer"></div>

  <input type="text" id="name-input" placeholder="type the name of your crush..." />
  <button id="upload-btn">Upload</button>

<script>
  // *** PASTE YOUR FIREBASE REALTIME DATABASE URL HERE ***
  const FIREBASE_URL = "https://my-crush-278a7-default-rtdb.asia-southeast1.firebasedatabase.app/";

  // *** EXACT MATCH LIST — names that are blocked entirely ***
  const listA = ["cunt", "bob"];
  const listB = ["text2", "diana"];
  const listC = ["edward", "fiona"];
  const allNames = [...listA, ...listB, ...listC];

  // *** CONTAINS LIST — if any of these words appear anywhere in the input, it is blocked ***
  const blockedWords = [
    "ass",
    "arse"
    "fag",
    "bitch",
    "cunt",
"rape"

    // Add as many as you need
  ];

  const nameDisplay = document.getElementById("current-name");
  const statusMsg = document.getElementById("status-msg");
  const input = document.getElementById("name-input");

  // Check if the input contains any blocked word as a substring
  function containsBlockedWord(text) {
    const lower = text.toLowerCase();
    return blockedWords.some(word => lower.includes(word.toLowerCase()));
  }

  // Load the current name from Firebase on page load
  function loadCurrentName() {
    fetch(`${FIREBASE_URL}/crush.json`)
      .then(r => r.json())
      .then(data => {
        nameDisplay.textContent = data && data.name ? data.name : "—";
      })
      .catch(() => {
        nameDisplay.textContent = "—";
      });
  }

  loadCurrentName();
  setInterval(loadCurrentName, 5000);

  document.getElementById("upload-btn").addEventListener("click", function () {
    const rawInput = input.value.trim();
    const lowerInput = rawInput.toLowerCase();

    statusMsg.style.color = "white";

    if (rawInput === "") {
      statusMsg.textContent = "Please type a name first.";
      return;
    }

    // Check 1: exact match block list
    if (allNames.includes(lowerInput)) {
      statusMsg.textContent = "That name is not available.";
      input.value = "";
      return;
    }

    // Check 2: contains a blocked word anywhere within the input
    if (containsBlockedWord(rawInput)) {
      statusMsg.textContent = "That name is not available.";
      input.value = "";
      return;
    }

    // Passed both checks — upload to Firebase
    fetch(`${FIREBASE_URL}/crush.json`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: rawInput })
    })
      .then(r => r.json())
      .then(() => {
        nameDisplay.textContent = rawInput;
        statusMsg.style.color = "#FFD700";
        statusMsg.textContent = "Uploaded!";
        input.value = "";
        setTimeout(() => statusMsg.textContent = "", 3000);
      })
      .catch(() => {
        statusMsg.style.color = "white";
        statusMsg.textContent = "Upload failed. Please try again.";
      });
  });
</script>

  

</body>
</html>
