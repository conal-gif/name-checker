<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>My Crush</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      background-image: url('background.jpg');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 30px 40px;
    }

    #hashtag {
      font-size: 42px;
      font-weight: 900;
      color: #FFD700;
      text-align: left;
      width: 100%;
      max-width: 420px;
      line-height: 1.1;
      margin-bottom: 18px;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
    }

    #current-name {
      width: 100%;
      max-width: 420px;
      background: white;
      border: 3px solid white;
      border-radius: 10px;
      font-size: 36px;
      font-weight: 700;
      color: #111;
      text-align: center;
      padding: 14px 20px;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      font-family: 'Barlow', sans-serif;
    }

    #status-msg {
      font-size: 15px;
      font-weight: 700;
      color: white;
      text-align: center;
      min-height: 22px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
      margin-bottom: 0;
    }

    .spacer {
      flex: 1;
    }

    #name-input {
      width: 100%;
      max-width: 420px;
      background: white;
      border: 3px solid white;
      border-radius: 10px;
      font-size: 22px;
      font-weight: 700;
      color: #111;
      padding: 16px 20px;
      font-family: 'Barlow', sans-serif;
      outline: none;
      margin-bottom: 16px;
    }

    #name-input::placeholder {
      color: #aaa;
      font-weight: 700;
    }

    #upload-btn {
      width: 60%;
      max-width: 260px;
      background: #FFD700;
      border: none;
      border-radius: 14px;
      font-size: 32px;
      font-weight: 900;
      color: #111;
      padding: 16px 20px;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      letter-spacing: 0.5px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    #upload-btn:active {
      background: #e6c200;
    }
  </style>
</head>
<body>

  <div id="hashtag">#YourLemonCrush</div>

  <div id="current-name">Loading...</div>
  <div id="status-msg"></div>

  <div class="spacer"></div>

  <input type="text" id="name-input" placeholder="type the name of your crush..." />
  <button id="upload-btn">Upload</button>

<script>
  // *** PASTE YOUR FIREBASE REALTIME DATABASE URL HERE ***
  const FIREBASE_URL = "https://my-crush-278a7-default-rtdb.asia-southeast1.firebasedatabase.app/";

  // *** EXACT MATCH LIST — names blocked entirely ***
  const listA = ["faggot", "cunny"];
  const listB = ["slut", "hitler"];
  const listC = ["nazi", "test"];
  const allNames = [...listA, ...listB, ...listC];

  // *** CONTAINS LIST — blocks if any of these appear anywhere in the input ***
  const blockedWords = [
    "bitch",
    "ass",
    "cunt",
    "fag"
  ];

  const nameDisplay = document.getElementById("current-name");
  const statusMsg = document.getElementById("status-msg");
  const input = document.getElementById("name-input");
  const btn = document.getElementById("upload-btn");

  function containsBlockedWord(text) {
    const lower = text.toLowerCase();
    return blockedWords.some(word => lower.includes(word.toLowerCase()));
  }

  function loadCurrentName() {
    fetch(`${FIREBASE_URL}/crush.json`)
      .then(r => {
        if (!r.ok) throw new Error("Bad response");
        return r.json();
      })
      .then(data => {
        // Only update display once Firebase responds with real data
        if (data && data.name) {
          nameDisplay.textContent = data.name;
        } else {
          nameDisplay.textContent = "—";
        }
      })
      .catch(() => {
        // If Firebase URL is wrong or unreachable, show a clear message
        nameDisplay.textContent = "—";
        statusMsg.style.color = "white";
        statusMsg.textContent = "Could not connect. Check Firebase URL.";
      });
  }

  loadCurrentName();
  setInterval(loadCurrentName, 5000);

  btn.addEventListener("click", function () {
    const rawInput = input.value.trim();
    const lowerInput = rawInput.toLowerCase();

    statusMsg.style.color = "white";
    statusMsg.textContent = "";

    if (rawInput === "") {
      statusMsg.textContent = "Please type a name first.";
      return;
    }

    // Run ALL checks before anything is displayed or uploaded
    if (allNames.includes(lowerInput) || containsBlockedWord(rawInput)) {
      statusMsg.textContent = "That name is not available.";
      input.value = "";
      return;
    }

    // Checks passed — disable button to prevent double-submissions
    btn.disabled = true;
    btn.textContent = "Uploading...";

    fetch(`${FIREBASE_URL}/crush.json`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: rawInput })
    })
      .then(r => {
        if (!r.ok) throw new Error("Upload failed");
        return r.json();
      })
      .then(() => {
        // Only update the display AFTER Firebase confirms the write
        nameDisplay.textContent = rawInput;
        statusMsg.style.color = "#FFD700";
        statusMsg.textContent = "Uploaded!";
        input.value = "";
        setTimeout(() => statusMsg.textContent = "", 3000);
      })
      .catch(() => {
        statusMsg.textContent = "Upload failed. Please try again.";
      })
      .finally(() => {
        // Re-enable button regardless of outcome
        btn.disabled = false;
        btn.textContent = "Upload";
      });
  });
</script>

  

</body>
</html>
