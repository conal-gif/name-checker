<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>My Crush</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Barlow', sans-serif;
      height: 100vh;
      overflow: hidden;
      background-image: url('background.jpg');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;  /* centres everything vertically */
      padding: 0 30px;
      gap: 0;
    }

    #hashtag {
      font-size: 36px;
      font-weight: 900;
      color: #FFD700;
      text-align: center;
      width: 100%;
      max-width: 420px;
      white-space: nowrap;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
      margin-bottom: 12px;
    }

    #current-name {
      width: 100%;
      max-width: 420px;
      background: white;
      border: 3px solid white;
      border-radius: 10px;
      font-size: 34px;
      font-weight: 700;
      color: #111;
      text-align: center;
      padding: 12px 20px;
      min-height: 66px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow', sans-serif;
      margin-bottom: 8px;
    }

    #status-msg {
      font-size: 14px;
      font-weight: 700;
      color: white;
      text-align: center;
      min-height: 20px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
      margin-bottom: 28px; /* gap between top group and bottom group */
    }

    #name-input {
      width: 100%;
      max-width: 420px;
      background: white;
      border: 3px solid white;
      border-radius: 10px;
      font-size: 20px;
      font-weight: 700;
      color: #111;
      padding: 14px 20px;
      font-family: 'Barlow', sans-serif;
      outline: none;
      margin-bottom: 12px;
    }

    #name-input::placeholder {
      color: #aaa;
      font-weight: 700;
    }

    #upload-btn {
      width: 60%;
      max-width: 260px;
      background: #FFD700;
      border: none;
      border-radius: 14px;
      font-size: 30px;
      font-weight: 900;
      color: #111;
      padding: 14px 20px;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      letter-spacing: 0.5px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
      margin-bottom: 16px;
    }

    #upload-btn:active { background: #e6c200; }

    #logo {
      width: 70%;
      max-width: 180px;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>

  <div id="hashtag">#YourNewCrush</div>
  <div id="current-name">Loading...</div>
  <div id="status-msg"></div>

  <input type="text" id="name-input" placeholder="type the name of your crush..." />
  <button id="upload-btn">Upload</button>
  <img id="logo" src="logoOverlay.png" alt="Logo" />

<script>
  const FIREBASE_URL = "https://my-crush-278a7-default-rtdb.asia-southeast1.firebasedatabase.app";

  const goodNames = [
    "Emma", "Liam", "Olivia", "Noah", "Ava", "Jack", "Charlotte", "Morgan", "Johnny"
  ];

  const CYCLE_INTERVAL_MS = 5 * 60 * 1000;

  const nameDisplay = document.getElementById("current-name");
  const statusMsg   = document.getElementById("status-msg");
  const input       = document.getElementById("name-input");
  const btn         = document.getElementById("upload-btn");

  // Cache for already-loaded letter sets — avoids re-downloading the same file
  const nameCache = {};
  let currentFetchLetter = null;
  let currentLetterSet = null;

  // Fetch the names file for a given first letter
  function loadNamesForLetter(letter) {
    letter = letter.toLowerCase();

    // Already cached — use it immediately
    if (nameCache[letter]) {
      currentLetterSet = nameCache[letter];
      return;
    }

    // Already fetching this letter — don't double-fetch
    if (currentFetchLetter === letter) return;

    currentFetchLetter = letter;
    currentLetterSet = null; // mark as loading

    fetch(`names-${letter}.txt`)
      .then(r => {
        if (!r.ok) throw new Error(`No file for letter: ${letter}`);
        return r.text();
      })
      .then(text => {
        const nameSet = new Set(
          text.split("\n")
              .map(n => n.trim().toLowerCase())
              .filter(n => n.length > 0)
        );
        nameCache[letter] = nameSet;
        // Only apply if user hasn't moved to a different letter since
        if (currentFetchLetter === letter) {
          currentLetterSet = nameSet;
        }
      })
      .catch(() => {
        // File missing or empty — treat as no approved names for that letter
        nameCache[letter] = new Set();
        if (currentFetchLetter === letter) {
          currentLetterSet = nameCache[letter];
        }
      });
  }

  // Pre-fetch the most common starting letters in the background after page load
  function prefetchCommonLetters() {
    const common = ["a","b","c","d","e","j","k","l","m","n","o","r","s","t"];
    common.forEach((letter, i) => {
      setTimeout(() => {
        if (!nameCache[letter]) loadNamesForLetter(letter);
      }, i * 300); // stagger by 300ms each so they don't all fire at once
    });
  }

  // Start fetching as soon as the user types the first letter
  input.addEventListener("input", function () {
    const val = input.value.trim();
    if (val.length === 0) {
      currentLetterSet = null;
      currentFetchLetter = null;
      return;
    }
    const firstLetter = val[0].toLowerCase();
    if (!/^[a-z]$/.test(firstLetter)) return;

    // Only trigger a new fetch if the first letter has changed
    if (currentFetchLetter !== firstLetter) {
      loadNamesForLetter(firstLetter);
    }
  });

  let goodNameIndex = 0;
  let cycleTimer = null;

  function publishNextGoodName() {
    const name = goodNames[goodNameIndex % goodNames.length];
    goodNameIndex++;
    fetch(`${FIREBASE_URL}/crush.json`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, autoPosted: true, timestamp: Date.now() })
    }).catch(() => {});
  }

  function resetCycleTimer() {
    if (cycleTimer) clearTimeout(cycleTimer);
    cycleTimer = setTimeout(function tick() {
      publishNextGoodName();
      cycleTimer = setTimeout(tick, CYCLE_INTERVAL_MS);
    }, CYCLE_INTERVAL_MS);
  }

  function loadCurrentName() {
    fetch(`${FIREBASE_URL}/crush.json`)
      .then(r => {
        if (!r.ok) throw new Error("Bad response");
        return r.json();
      })
      .then(data => {
        if (data && data.name) {
          nameDisplay.textContent = data.name;
          if (!data.autoPosted && data.timestamp) {
            const elapsed = Date.now() - data.timestamp;
            const remaining = CYCLE_INTERVAL_MS - elapsed;
            if (cycleTimer) clearTimeout(cycleTimer);
            if (remaining > 0) {
              cycleTimer = setTimeout(function tick() {
                publishNextGoodName();
                cycleTimer = setTimeout(tick, CYCLE_INTERVAL_MS);
              }, remaining);
            } else {
              publishNextGoodName();
              resetCycleTimer();
            }
          }
        } else {
          nameDisplay.textContent = "—";
        }
      })
      .catch(() => {
        nameDisplay.textContent = "—";
        statusMsg.style.color = "white";
        statusMsg.textContent = "Could not connect. Check Firebase URL.";
      });
  }

  loadCurrentName();
  setInterval(loadCurrentName, 5000);
  resetCycleTimer();

  // Kick off background prefetch after page has settled
  setTimeout(prefetchCommonLetters, 2000);

  btn.addEventListener("click", function () {
    const rawInput   = input.value.trim();
    const lowerInput = rawInput.toLowerCase();

    statusMsg.style.color = "white";
    statusMsg.textContent = "";

    if (rawInput === "") {
      statusMsg.textContent = "Please type a name first.";
      return;
    }

    const firstLetter = lowerInput[0];

    // Still downloading the file for this letter
    if (currentLetterSet === null && currentFetchLetter === firstLetter) {
      statusMsg.textContent = "Still loading, please try again.";
      return;
    }

    // Letter file missing or empty
    if (!currentLetterSet || !currentLetterSet.has(lowerInput)) {
      statusMsg.textContent = "That name is not available.";
      input.value = "";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Uploading...";

    fetch(`${FIREBASE_URL}/crush.json`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: rawInput, autoPosted: false, timestamp: Date.now() })
    })
      .then(r => {
        if (!r.ok) throw new Error("Upload failed");
        return r.json();
      })
      .then(() => {
        nameDisplay.textContent = rawInput;
        statusMsg.style.color = "#FFD700";
        statusMsg.textContent = "Uploaded!";
        input.value = "";
        resetCycleTimer();
        setTimeout(() => statusMsg.textContent = "", 3000);
      })
      .catch(() => {
        statusMsg.textContent = "Upload failed. Please try again.";
      })
      .finally(() => {
        btn.disabled = false;
        btn.textContent = "Upload";
      });
  });
</script>
</body>
</html>
