<!DOCTYPE html>

      box-sizing: border-box;
    }

    body {
      font-family: 'Barlow', sans-serif;
      height: 100vh;
      overflow: hidden;
      background-image: url('background.jpg');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;  /* centres everything vertically */

      gap: 0;
    }

    #hashtag {
      font-size: 36px;
      font-weight: 900;
      color: #FFD700;
      text-align: center;
      width: 100%;
      max-width: 420px;
      white-space: nowrap;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
      margin-bottom: 12px;
    }

    #current-name {
      width: 100%;
      max-width: 420px;
      background: white;
      border: 3px solid white;
      border-radius: 10px;
      font-size: 34px;
      font-weight: 700;
      color: #111;
      text-align: center;
      padding: 12px 20px;
      min-height: 66px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow', sans-serif;
      margin-bottom: 8px;
    }

    #status-msg {
      font-size: 14px;
      font-weight: 700;
      color: white;
      text-align: center;
      min-height: 20px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
      margin-bottom: 28px; /* gap between top group and bottom group */
    }

    #name-input {
      width: 100%;
      max-width: 420px;
      background: white;
      border: 3px solid white;
      border-radius: 10px;
      font-size: 20px;
      font-weight: 700;
      color: #111;
      padding: 14px 20px;
      font-family: 'Barlow', sans-serif;
      outline: none;
      margin-bottom: 12px;
    }

    #name-input::placeholder {
      color: #aaa;
      font-weight: 700;
    }

    #upload-btn {
      width: 60%;
      max-width: 260px;
      background: #FFD700;
      border: none;
      border-radius: 14px;
      font-size: 30px;
      font-weight: 900;
      color: #111;
      padding: 14px 20px;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      letter-spacing: 0.5px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
      margin-bottom: 16px;
    }

    #upload-btn:active { background: #e6c200; }

    #logo {
      width: 70%;
      max-width: 180px;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>

  <div id="hashtag">#YourNewCrush</div>
  <div id="current-name">Loading...</div>
  <div id="status-msg"></div>

  <input type="text" id="name-input" placeholder="type the name of your crush..." />
  <button id="upload-btn">Upload</button>
  <img id="logo" src="logoOverlay.png" alt="Logo" />

<script>

  // *** EXACT MATCH BLOCK LIST ***

  const listB = ["s1ut", "hitler", "fa99ot", "fagg0f", "homo", "anus", "arsehole", "azzhole", "bollocks", "nig" , "nog","nogger", "niga" , "nigga", "ni99er", "cum" ,"cumming" ,"currymuncher" ,"darkie","darkies", "fellatio","ghey", "ghay", "jewboy" ];
  const listC = ["nazi", "hoe", "skank", "whore", "d1ck", "balls", "balllicker" ,"bigbreasts" ,"vaglna","bestiality" ,"biatch" ,"bumfuck" ,"bumfucker" ,"cntz", "cnts", "cnut" ,"cracker",  "gypsys", "hezbollah", "hamas", "isis" ,"jisim" ,"jizim" , "kkk" ,"tit", "titty", "titties" ];
  const allNames = [...listA, ...listB, ...listC];

  // *** CONTAINS BLOCK LIST ***
  const blockedWords = [
    "bitch", "nigger", "shit","nazi", "hoe", "skank", "whore", "d1ck", "cunt", "slut", "whore", "vagina", "cock" ,"dyke", "dike" ,"lezbo" ,"ass", "penis","arrse",  "arse", "cunt", "fag", "nazi","naz1", "pussy" , "slut", "wank", "jerk" , "blowjob","fatfucker", "boner", "bum", "butt"  , "dipshit" ,"peepee" ,"poopoo", "holestuffer", "massterb", "masterb", "master", "mastur",
    "fuck", "lick", "fanny", "dick","d1ck", "cock", "chink", "slant" , "f4g" , "fa9", "anal", "bareback", "bastard", "boobie", "booby", "diaper", "gook", "hardcore", "jackoff", "kike", "kyke", "molest", "muff", "negro", "negr0", "negres", "niggar", "nigger" ,"niggah", "breast",
    "boob", "booob", "boooob", "booooob", "b00b", "b000b", "b0000b", "b00000b" , "breast" , "gay", "lesbian", "lezbian" ,"dildo" ,"dingleber", "golliwog", "goldenshower" , "fukah", "fuker", "fukkah", "fukker", "nigg", "orgasim", "terror",
    "bukake", "bukkake" ,"crotch", "creampie" ,"deepthroat" ,"doggiestyle" ,"douche" ,"doublepenetration", "ejaculat" ,"ejackulat" ,"fanny", "fart", "fcuk", "feltch" ,"fuktard", "goddam", "cammeltoe", "paedophile" , "peeenus" ,"pantie" ,"panty"
  ];

  // *** GOOD NAMES — cycled automatically when no submission for 5 minutes ***
  const goodNames = [
    "Emma", "Liam", "Olivia", "Noah", "Ava", "Jack", "Charlotte", "Morgan", "Johnny"
  ];

  const CYCLE_INTERVAL_MS = 5 * 60 * 1000;

  const nameDisplay = document.getElementById("current-name");
  const statusMsg   = document.getElementById("status-msg");
  const input       = document.getElementById("name-input");
  const btn         = document.getElementById("upload-btn");

  let goodNameIndex = 0;
  let cycleTimer = null;

  function containsInvalidCharacters(text) {
    return /[^a-zA-Z]/.test(text);
  }

  function containsBlockedWord(text) {
    const lower = text.toLowerCase();
    return blockedWords.some(word => lower.includes(word.toLowerCase()));
  }

  function publishNextGoodName() {
    const name = goodNames[goodNameIndex % goodNames.length];
    goodNameIndex++;
    fetch(`${FIREBASE_URL}/crush.json`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, autoPosted: true, timestamp: Date.now() })
    }).catch(() => {});
  }

  function resetCycleTimer() {
    if (cycleTimer) clearTimeout(cycleTimer);
    cycleTimer = setTimeout(function tick() {
      publishNextGoodName();
      cycleTimer = setTimeout(tick, CYCLE_INTERVAL_MS);
    }, CYCLE_INTERVAL_MS);
  }

  function loadCurrentName() {
    fetch(`${FIREBASE_URL}/crush.json`)
      .then(r => {
        if (!r.ok) throw new Error("Bad response");
        return r.json();
      })
      .then(data => {
        if (data && data.name) {
          nameDisplay.textContent = data.name;
          if (!data.autoPosted && data.timestamp) {
            const elapsed = Date.now() - data.timestamp;
            const remaining = CYCLE_INTERVAL_MS - elapsed;
            if (cycleTimer) clearTimeout(cycleTimer);
            if (remaining > 0) {
              cycleTimer = setTimeout(function tick() {
                publishNextGoodName();
                cycleTimer = setTimeout(tick, CYCLE_INTERVAL_MS);
              }, remaining);
            } else {
              publishNextGoodName();
              resetCycleTimer();
            }
          }
        } else {
          nameDisplay.textContent = "—";
        }
      })
      .catch(() => {
        nameDisplay.textContent = "—";
        statusMsg.style.color = "white";
        statusMsg.textContent = "....";
      });
  }

  loadCurrentName();
  setInterval(loadCurrentName, 5000);
  resetCycleTimer();

  btn.addEventListener("click", function () {
    const rawInput   = input.value.trim();
    const lowerInput = rawInput.toLowerCase();

    statusMsg.style.color = "white";
    statusMsg.textContent = "";

    if (rawInput === "") {
      statusMsg.textContent = "Please type a name first.";
      return;
    }

    if (containsInvalidCharacters(rawInput)) {
      statusMsg.textContent = "Letters only please.";
      input.value = "";
      return;
    }

    if (allNames.includes(lowerInput) || containsBlockedWord(rawInput)) {
      statusMsg.textContent = "That name is not available.";
      input.value = "";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Uploading...";

    fetch(`${FIREBASE_URL}/crush.json`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: rawInput, autoPosted: false, timestamp: Date.now() })
    })
      .then(r => {
        if (!r.ok) throw new Error("Upload failed");
        return r.json();
      })
      .then(() => {
        nameDisplay.textContent = rawInput;
        statusMsg.style.color = "#FFD700";
        statusMsg.textContent = "Uploaded!";
        input.value = "";
        resetCycleTimer();
        setTimeout(() => statusMsg.textContent = "", 3000);
      })
      .catch(() => {
        statusMsg.textContent = "Upload failed. Please try again.";
      })
      .finally(() => {
        btn.disabled = false;
        btn.textContent = "Upload";
      });
  });
</script>

</body>
</html>
